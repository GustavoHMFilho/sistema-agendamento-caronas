{% extends 'agendamentos/base.html' %}

{% block title %}{{ titulo }} - Caronas UFLA{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">{{ titulo }}</h1>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% include 'agendamentos/partials/form_fields.html' %}
                    <div class="d-flex flex-wrap gap-2">
                        <button class="btn btn-primary" type="submit">Salvar</button>
                        <a class="btn btn-outline-secondary" href="{% url 'dashboard' %}">Voltar</a>
                        {% if titulo == 'Oferecer carona' %}
                            <a class="btn btn-outline-primary" href="{% url 'criar_local' %}">Cadastrar local</a>
                        {% endif %}
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
