{% extends 'agendamentos/base.html' %}

{% block title %}Entrar - Caronas UFLA{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Entrar</h1>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% if form.non_field_errors %}
                        <div class="alert alert-danger">{{ form.non_field_errors }}</div>
                    {% endif %}
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.username.id_for_label }}">Usuario</label>
                        <input class="form-control" type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.password.id_for_label }}">Senha</label>
                        <input class="form-control" type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Entrar</button>
                </form>
                <p class="mb-0 mt-3 text-center text-secondary">
                    Ainda nao tem conta?
                    <a href="{% url 'cadastro' %}">Cadastre-se</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
